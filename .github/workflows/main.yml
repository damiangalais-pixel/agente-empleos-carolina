name: Envio Diario Carolina

on:
  schedule:
    # Se ejecuta todos los días a las 12:15 UTC (9:15 AM Argentina)
    - cron: '15 12 * * *'
  workflow_dispatch: # Esto permite que lo pruebes manualmente cuando quieras

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v3
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Instalar librerias
        run: pip install requests
      - name: Ejecutar agente
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python agente.py
